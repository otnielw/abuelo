<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abuelo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: #fff;
  }

  /* Top nav */
  .top-nav {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 15px;
    font-size: 13px;
  }
  .top-nav a {
    color: rgba(0,0,0,.87);
    text-decoration: none;
    padding: 0 12px;
    line-height: 24px;
  }
  .top-nav a:hover { text-decoration: underline; }
  .top-nav .signin-btn {
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 9px 23px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-left: 10px;
    text-decoration: none;
  }
  .top-nav .signin-btn:hover {
    background: #1765cc;
    text-decoration: none;
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 80px;
  }

  /* Logo */
  .logo {
    font-size: 92px;
    font-weight: 400;
    margin-bottom: 25px;
    user-select: none;
    letter-spacing: -2px;
  }
  .logo .a1 { color: #4285f4; }
  .logo .b  { color: #ea4335; }
  .logo .u  { color: #fbbc05; }
  .logo .e  { color: #4285f4; }
  .logo .l  { color: #34a853; }
  .logo .o  { color: #ea4335; }

  /* Search box */
  .search-container {
    width: 100%;
    max-width: 584px;
    margin-bottom: 20px;
  }
  .search-box {
    display: flex;
    align-items: center;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    padding: 10px 14px;
    height: 46px;
    transition: box-shadow 0.2s;
  }
  .search-box:hover, .search-box:focus-within {
    box-shadow: 0 1px 6px rgba(32,33,36,.28);
    border-color: rgba(223,225,229,0);
  }
  .search-icon {
    width: 20px;
    height: 20px;
    margin-right: 12px;
    flex-shrink: 0;
    color: #9aa0a6;
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    background: transparent;
    color: #202124;
  }
  .mic-icon {
    width: 24px;
    height: 24px;
    margin-left: 8px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Buttons */
  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    justify-content: center;
  }
  .buttons button {
    background: #f8f9fa;
    border: 1px solid #f8f9fa;
    border-radius: 4px;
    color: #3c4043;
    font-size: 14px;
    padding: 0 16px;
    height: 36px;
    cursor: pointer;
    min-width: 54px;
  }
  .buttons button:hover {
    border-color: #dadce0;
    box-shadow: 0 1px 1px rgba(0,0,0,.1);
  }

  /* Language row */
  .language {
    font-size: 13px;
    color: #70757a;
    margin-top: 20px;
  }
  .language a {
    color: #1a0dab;
    text-decoration: none;
    font-size: 13px;
    padding: 0 4px;
  }
  .language a:hover { text-decoration: underline; }

  /* Footer */
  footer {
    background: #f2f2f2;
    border-top: 1px solid #dadce0;
    font-size: 14px;
    color: #70757a;
  }
  .footer-top {
    padding: 15px 30px;
    border-bottom: 1px solid #dadce0;
  }
  .footer-bottom {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .footer-bottom .left a,
  .footer-bottom .right a {
    color: #70757a;
    text-decoration: none;
    padding: 0 12px;
    font-size: 14px;
  }
  .footer-bottom .left a:hover,
  .footer-bottom .right a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

  <nav class="top-nav">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" style="margin: 0 12px; cursor:pointer; fill:#5f6368;">
      <path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"/>
    </svg>
    <a href="#" class="signin-btn">Sign in</a>
  </nav>

  <main class="main">
    <div class="logo">
      <span class="a1">a</span><span class="b">b</span><span class="u">u</span><span class="e">e</span><span class="l">l</span><span class="o">o</span>
    </div>

    <div class="search-container">
      <div class="search-box">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" aria-label="Search" autofocus>
        <svg class="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path fill="#4285f4" d="M12 15c1.66 0 2.99-1.34 2.99-3L15 6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3z"/>
          <path fill="#34a853" d="M11 18.95h2V22h-2z"/>
          <path fill="#f4b400" d="M7.05 16.87l-1.41-1.41C6.89 16.71 8.36 17.74 10 18.28v-2.15c-1.13-.4-2.08-1.21-2.65-2.26z"/>
          <path fill="#ea4335" d="M12 16.5c-2.48 0-4.5-2.02-4.5-4.5H5c0 3.04 2.19 5.57 5.07 6.09V22h1.86v-3.91C14.81 17.57 17 15.04 17 12h-2.5c0 2.48-2.02 4.5-4.5 4.5z"/>
        </svg>
      </div>
    </div>

    <div class="buttons">
      <button>Abuelo Search</button>
      <button>I'm Feeling Lucky</button>
    </div>

    <div class="language">
      Abuelo offered in:
      <a href="#">Espa&ntilde;ol</a>
      <a href="#">Fran&ccedil;ais</a>
      <a href="#">Portugu&ecirc;s</a>
      <a href="#">Deutsch</a>
    </div>
  </main>

  <footer>
    <div class="footer-top">United States</div>
    <div class="footer-bottom">
      <div class="left">
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div class="right">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>

</body>
</html>
